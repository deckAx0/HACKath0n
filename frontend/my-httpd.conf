Listen 80
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule unixd_module modules/mod_unixd.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule dir_module modules/mod_dir.so
LoadModule mime_module modules/mod_mime.so
LoadModule log_config_module modules/mod_log_config.so

# 2. Global Server Settings
ServerName localhost
DocumentRoot "/usr/local/apache2/htdocs"

# 3. HTTPS & Cloudflare Logic
<Directory "/usr/local/apache2/htdocs">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted

    RewriteEngine On
    RewriteBase /

    # Redirect HTTP to HTTPS 
    # Logic: If it's NOT localhost AND (Not already HTTPS OR Cloudflare says it's not HTTPS)
    RewriteCond %{HTTP_HOST} !^localhost [NC]
    RewriteCond %{HTTP_X_Forwarded_Proto} !https
    RewriteCond %{HTTPS} off
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    # React Router Fallback
    FallbackResource /index.html
</Directory>

# 4. Reverse Proxy for API
# We put this OUTSIDE the Directory block
ProxyRequests Off
ProxyPreserveHost On

# Proxy /api/ requests to the 'backend' service on port 5000
ProxyPass /api/ http://backend:5000/api/
ProxyPassReverse /api/ http://backend:5000/api/

ErrorLog /proc/self/fd/2
CustomLog /proc/self/fd/1 common

User daemon
Group daemon
