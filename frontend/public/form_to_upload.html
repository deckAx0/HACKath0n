<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завантаження лог-файлу</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #121212;
            color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .upload-container {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h2 {
            color: #a4d65e;
            margin-top: 0;
            text-transform: uppercase;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 25px;
        }
        input[type="file"] {
            background: #2a2a2a;
            padding: 15px;
            border: 2px dashed #a4d65e;
            border-radius: 5px;
            color: #ccc;
            cursor: pointer;
        }
        input[type="file"]::file-selector-button {
            background: #444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            margin-right: 15px;
            cursor: pointer;
        }
        button {
            background-color: #a4d65e;
            color: #000;
            padding: 15px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #8cc446;
        }
        .back-link {
            display: block;
            margin-top: 25px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="upload-container">
        <h2>Завантажити .bin лог</h2>
        
        <form action="XZ" method="POST" enctype="multipart/form-data"> <-- TODO Upload URL -->
            <input type="file" name="file" accept=".bin" required>
            <button type="submit">Аналізувати</button>
        </form>
        
        <a href="/public/index.html" class="back-link">← На головну</a>
    </div>

</body>
</html>
